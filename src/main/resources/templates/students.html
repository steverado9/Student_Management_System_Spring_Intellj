<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-sm navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">Student Management System</a>
        </div>
        <ul class="nav navbar-nav">
            <li class="active"><a class="text-white text-decoration-none" th:href="@{/students}">Student Management</a></li>
        </ul>
    </div>
</nav>
<br>
<br>

    <div class = "container">
        <div class = "row">
            <h1> List Students </h1>
        </div>

        <div class="row">
            <div class="col-lg-3">
                <a th:href = "@{/students/new}" class="btn btn-primary btn-sm mb-3">Add Student</a>
            </div>
        </div>

        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Student First Name</th>
                    <th>Student Last Name</th>
                    <th>Student Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                    <!-- Using thymeLeaf attribute to iterate through the students-->
                    <!--th: each this is thymeleaf for each-->
                    <tr th:each = "student : ${students}">
                        <td th:text = "${student.firstName}"></td>
                        <td th:text = "${student.lastName}"></td>
                        <td th:text = "${student.email}"></td>
                        <td>
                            <a th:href = "@{/students/edit/{id}(id=${student.id})}"
                            class="btn btn-primary">Update </a>

                            <a th:href = "@{/students/{id}(id=${student.id})}"
                               class="btn btn-danger delete-link">Delete </a>
                        </td>
                    </tr>
            </tbody>
        </table>
    </div>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        document.querySelectorAll(".delete-link").forEach(link => {
            link.addEventListener("click", function(event) {

                event.preventDefault(); //stop link from navigating immediately

                const url = this.getAttribute("href");

                Swal.fire({
                    title: "Are you sure?",
                    text: "This student will be deleted permanently!",
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonColor: "#d33",
                    cancelButtonColor: "#3085d6",
                    confirmButtonText: "Yes, delete!"
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = url;
                    }
                });

            });
        });

    });
</script>

</body>
</html>
