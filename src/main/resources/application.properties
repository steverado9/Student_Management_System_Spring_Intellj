spring.application.name=Student Management
spring.datasource.url=jdbc:mysql://localhost:3306/sms?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false
spring.datasource.username=root
spring.datasource.password=12345

#Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


#Hibernate auto ddl //we will use this to drop existing or create tables after creation
spring.jpa.hibernate.ddl-auto=create

#logging to see hibernate intended queries
logging.level.org.hibernate.SQL=DEBUG

#error handling
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

